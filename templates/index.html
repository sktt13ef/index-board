<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市场看板</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0b0d12;
            --bg-surface: #10131a;
            --bg-card: #13161f;
            --bg-card-hover: #181c28;

            --text-1: #e8ecf4;
            --text-2: #7d8899;
            --text-3: #3e4a5a;

            --accent: #4e8cff;
            --up:   #f04040;
            --down: #1ebb72;

            --border:      rgba(255,255,255,0.06);
            --border-card: rgba(255,255,255,0.05);

            --cn:        #f04040;
            --hk:        #f5a623;
            --us:        #4e8cff;
            --commodity: #a855f7;
            --bond:      #22d3ee;
            --global:    #22c55e;

            --header-h: 52px;
            --drawer-h: 340px;
            --r: 12px;
        }

        [data-theme="light"] {
            --bg: #f2f4f8;
            --bg-surface: #ffffff;
            --bg-card: #ffffff;
            --bg-card-hover: #f7f8fc;
            --text-1: #0f172a;
            --text-2: #475569;
            --text-3: #94a3b8;
            --border:      rgba(0,0,0,0.06);
            --border-card: rgba(0,0,0,0.05);
            --cn:        #dc2626;
            --hk:        #d97706;
            --us:        #2563eb;
            --commodity: #9333ea;
            --bond:      #0891b2;
            --global:    #16a34a;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text-1);
            transition: background .3s, color .3s;
        }

        /* ══════════ HEADER ══════════ */
        .header {
            position: sticky; top: 0; z-index: 300;
            height: var(--header-h);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 28px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 16px; font-weight: 800; letter-spacing: -0.5px;
            color: var(--text-1);
        }
        .logo em { font-style: normal; color: var(--accent); }

        /* Filter pills */
        .filter-wrap {
            display: flex; align-items: center; gap: 3px;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 99px; padding: 3px;
        }
        .ftab {
            padding: 4px 14px; border-radius: 99px;
            font-size: 12px; font-weight: 500; cursor: pointer;
            border: none; background: transparent; color: var(--text-2);
            transition: all .15s;
        }
        .ftab:hover { color: var(--text-1); }
        .ftab.active {
            background: var(--bg-surface);
            color: var(--text-1);
            box-shadow: 0 1px 6px rgba(0,0,0,.2);
        }

        .hdr-right { display: flex; align-items: center; gap: 8px; }

        .live {
            display: flex; align-items: center; gap: 5px;
            font-size: 11px; color: var(--text-3);
        }
        .live-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--down);
            animation: glow 2s ease-in-out infinite;
        }
        @keyframes glow {
            0%,100% { box-shadow: 0 0 0 0 rgba(30,187,114,.5); opacity: 1; }
            50%      { box-shadow: 0 0 0 5px rgba(30,187,114,0); opacity: .6; }
        }

        .btn {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 8px; border: 1px solid var(--border);
            background: transparent; color: var(--text-2);
            cursor: pointer; transition: all .15s;
        }
        .btn:hover { background: rgba(255,255,255,.05); color: var(--text-1); }
        .btn svg { width: 14px; height: 14px; }
        .btn.spinning svg { animation: spin .7s linear infinite; }
        .btn.active { color: var(--accent); border-color: var(--accent); background: rgba(78,140,255,.1); }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ══════════ MAIN ══════════ */
        .main {
            padding: 20px 28px 48px;
            transition: padding-bottom .35s ease;
        }

        /* ══════════ CARDS ══════════ */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 10px;
        }

        .card {
            position: relative;
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: var(--r);
            padding: 16px;
            cursor: pointer;
            overflow: hidden;
            transition: transform .18s, box-shadow .18s, border-color .18s;
        }

        /* colored glow in top-left corner from market type */
        .card::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 120px; height: 80px;
            background: radial-gradient(ellipse at 0% 0%, var(--mc) 0%, transparent 70%);
            opacity: .07;
            pointer-events: none;
            border-radius: var(--r) 0 0 0;
            transition: opacity .18s;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(0,0,0,.28);
            border-color: rgba(255,255,255,.1);
        }
        .card:hover::after { opacity: .13; }

        .card.active {
            border-color: var(--mc) !important;
            box-shadow: 0 0 0 1px var(--mc), 0 12px 32px rgba(0,0,0,.28);
        }
        .card.active::after { opacity: .16; }

        .card.hidden { display: none; }

        /* top row */
        .c-top {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 12px;
        }
        .c-name { font-size: 13px; font-weight: 600; color: var(--text-1); line-height: 1.25; }
        .c-sym  { font-size: 10px; color: var(--text-3); margin-top: 2px; font-family: 'SF Mono', monospace; }

        .c-badges { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }

        .mbadge {
            display: inline-block;
            font-size: 10px; font-weight: 700; letter-spacing: .04em;
            padding: 2px 7px; border-radius: 4px;
        }
        .mbadge-cn        { background: rgba(240,64,64,.13);  color: var(--cn); }
        .mbadge-hk        { background: rgba(245,166,35,.13); color: var(--hk); }
        .mbadge-us        { background: rgba(78,140,255,.13); color: var(--us); }
        .mbadge-commodity { background: rgba(168,85,247,.13); color: var(--commodity); }
        .mbadge-bond      { background: rgba(34,211,238,.13); color: var(--bond); }
        .mbadge-global    { background: rgba(34,197,94,.13);  color: var(--global); }

        .sbadge {
            font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 3px;
        }
        .sbadge-danger { background: rgba(240,64,64,.12);  color: var(--up); }
        .sbadge-warn   { background: rgba(245,166,35,.12); color: var(--hk); }
        .sbadge-muted  { background: rgba(255,255,255,.04); color: var(--text-3); border: 1px solid var(--border); }

        /* price hero */
        .c-price {
            font-size: 26px; font-weight: 800; line-height: 1;
            font-family: 'SF Mono', Monaco, 'Courier New', monospace;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }
        .c-chg {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 12px; font-weight: 700;
            padding: 2px 8px; border-radius: 5px;
            margin-bottom: 12px;
        }
        .chg-up   { color: var(--up);   background: rgba(240,64,64,.1); }
        .chg-down { color: var(--down); background: rgba(30,187,114,.1); }
        .chg-flat { color: var(--text-2); background: rgba(255,255,255,.04); }

        /* mini stats */
        .c-stats {
            display: grid; grid-template-columns: repeat(3,1fr);
            border-top: 1px solid var(--border);
            padding-top: 10px; gap: 0;
        }
        .cs { text-align: center; }
        .cs:not(:last-child) { border-right: 1px solid var(--border); }
        .cs-l { font-size: 9px; color: var(--text-3); margin-bottom: 3px; }
        .cs-v { font-size: 11px; font-weight: 600; color: var(--text-2); font-family: 'SF Mono', monospace; }

        /* PE strip */
        .c-pe {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: 8px; padding: 7px 9px;
            border-radius: 7px;
            background: rgba(255,255,255,.03);
            border: 1px solid var(--border);
        }
        .pe-l { display: flex; align-items: center; gap: 6px; }
        .pe-k  { font-size: 10px; color: var(--text-3); }
        .pe-v  { font-size: 12px; font-weight: 800; color: var(--accent); font-family: 'SF Mono', monospace; }
        .pe-p  { font-size: 10px; color: var(--text-2); }
        .pe-dy { font-size: 10px; font-weight: 700; color: var(--down); }
        .pe-r  { font-size: 10px; color: var(--text-3); }

        /* 价格历史分位色 */
        .pct-danger { color: var(--up) !important; }
        .pct-warn   { color: var(--accent) !important; }
        .pct-muted  { color: var(--down) !important; }
        .pct-lbl-danger { color: var(--up); }
        .pct-lbl-warn   { color: var(--text-2); }
        .pct-lbl-muted  { color: var(--down); }

        /* footer */
        .c-foot {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: 8px;
        }
        .c-src { font-size: 10px; color: var(--text-3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 150px; }
        .c-src a { color: inherit; text-decoration: none; }
        .upill { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
        .upill-realtime { background: rgba(240,64,64,.09); color: #f06060; }
        .upill-daily    { background: rgba(245,166,35,.09); color: #f5a623; }
        .upill-delayed  { background: rgba(78,140,255,.09); color: #5a9aff; }

        .c-cny {
            display: flex; align-items: baseline; justify-content: space-between;
            margin: 6px 0 2px;
            padding: 5px 8px;
            border-radius: 6px;
            background: rgba(245,166,35,.08);
            border: 1px solid rgba(245,166,35,.18);
        }
        .cny-k { font-size: 10px; color: var(--text-3); letter-spacing: .5px; }
        .cny-v { font-size: 14px; font-weight: 700; color: #f5a623; }
        .cny-u { font-size: 10px; font-weight: 400; margin-left: 1px; opacity: .75; }

        .loading-state {
            grid-column: 1/-1;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            height: 180px; color: var(--text-3); font-size: 13px;
        }
        .ls-spin {
            width: 20px; height: 20px;
            border: 2px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; animation: spin .8s linear infinite;
        }

        /* ── drag & drop ── */
        .drag-handle {
            position: absolute;
            top: 10px; left: 10px;
            width: 16px; height: 20px;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-3);
            cursor: grab;
            opacity: 0;
            transition: opacity .15s;
            z-index: 2;
        }
        .drag-handle:active { cursor: grabbing; }
        .drag-handle svg { width: 10px; height: 14px; pointer-events: none; }
        .card:hover .drag-handle { opacity: 1; }

        .card.dragging {
            opacity: .35;
            cursor: grabbing;
        }
        /* drop target indicator: a visible gap/line before the target */
        .card.drop-before {
            box-shadow: -3px 0 0 0 var(--accent), 0 0 0 1px var(--border-card);
        }
        .card.drop-after {
            box-shadow: 3px 0 0 0 var(--accent), 0 0 0 1px var(--border-card);
        }

        /* ══════════ DRAWER ══════════ */
        .drawer {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 0;
            background: var(--bg-surface);
            border-top: 1px solid var(--border);
            z-index: 200;
            transition: height .32s cubic-bezier(.4,0,.2,1);
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .drawer.open { height: var(--drawer-h); }

        .dbar {
            flex-shrink: 0; height: 46px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            cursor: default;
        }

        .dbar-left { display: flex; align-items: center; gap: 14px; }

        .d-name {
            font-size: 14px; font-weight: 700; color: var(--text-1);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            max-width: 220px;
        }
        .d-price {
            font-size: 20px; font-weight: 800;
            font-family: 'SF Mono', Monaco, monospace;
            letter-spacing: -.5px; flex-shrink: 0;
        }
        .d-chg { font-size: 12px; font-weight: 700; flex-shrink: 0; }
        .d-chg.up   { color: var(--up); }
        .d-chg.down { color: var(--down); }
        .d-chg.flat { color: var(--text-2); }

        .dbar-right { display: flex; align-items: center; gap: 8px; }

        .ptabs {
            display: flex; gap: 2px;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; padding: 2px;
        }
        .ptab {
            padding: 3px 11px; border-radius: 6px;
            font-size: 11px; font-weight: 600; cursor: pointer;
            border: none; background: transparent; color: var(--text-2);
            transition: all .13s;
        }
        .ptab:hover { color: var(--text-1); }
        .ptab.active {
            background: var(--bg-card); color: var(--text-1);
            box-shadow: 0 1px 4px rgba(0,0,0,.2);
        }

        .d-close {
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 6px; cursor: pointer; color: var(--text-3);
            transition: all .15s;
        }
        .d-close:hover { background: rgba(255,255,255,.06); color: var(--text-1); }
        .d-close svg { width: 14px; height: 14px; }

        .dchart {
            flex: 1; min-height: 0;
            position: relative; padding: 14px 20px 18px;
        }
        .dchart canvas { width: 100% !important; height: 100% !important; }

        .c-overlay {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 8px; font-size: 12px; color: var(--text-3);
            background: var(--bg-surface); z-index: 5;
        }
        .c-overlay.hidden { display: none; }
        .c-spin {
            width: 22px; height: 22px;
            border: 2px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; animation: spin .8s linear infinite;
        }

        /* footer status */
        .statusbar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 28px;
            display: flex; align-items: center; padding: 0 20px;
            font-size: 10px; color: var(--text-3);
            background: var(--bg-surface); border-top: 1px solid var(--border);
            z-index: 100;
            transition: bottom .32s cubic-bezier(.4,0,.2,1);
        }

        /* ══════════ RESPONSIVE ══════════ */
        @media (max-width: 820px) {
            .header { padding: 0 14px; }
            .filter-wrap { display: none; }
            .main { padding: 12px 14px 40px; }
            .grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .c-price { font-size: 20px; }
            :root { --drawer-h: 290px; }
        }
        @media (max-width: 480px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">市场<em>看板</em></div>

    <div class="filter-wrap" id="filter-bar">
        <button class="ftab active" data-f="all">全部</button>
        <button class="ftab" data-f="cn">A股</button>
        <button class="ftab" data-f="hk">港股</button>
        <button class="ftab" data-f="us">美股</button>
        <button class="ftab" data-f="commodity">商品</button>
        <button class="ftab" data-f="bond">债券</button>
        <button class="ftab" data-f="global">全球</button>
    </div>

    <div class="hdr-right">
        <div class="live">
            <div class="live-dot" id="live-dot"></div>
            <span id="conn-txt">实时</span>
        </div>
        <button class="btn" id="sort-val-btn" title="按估值排序（便宜→贵）">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="4" y1="6" x2="20" y2="6"/>
                <line x1="4" y1="12" x2="14" y2="12"/>
                <line x1="4" y1="18" x2="8" y2="18"/>
            </svg>
        </button>
        <button class="btn" id="refresh-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
        </button>
        <button class="btn" id="theme-btn">
            <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
            <svg id="icon-sun" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"/>
                <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
        </button>
    </div>
</header>

<main class="main" id="main">
    <div class="grid" id="grid">
        <div class="loading-state"><div class="ls-spin"></div>正在加载…</div>
    </div>
</main>

<div class="statusbar" id="statusbar">
    <span id="status-txt">—</span>
</div>

<!-- Chart drawer -->
<div class="drawer" id="drawer">
    <div class="dbar">
        <div class="dbar-left">
            <span class="d-name" id="d-name">—</span>
            <span class="d-price" id="d-price">—</span>
            <span class="d-chg"  id="d-chg">—</span>
        </div>
        <div class="dbar-right">
            <div class="ptabs">
                <button class="ptab" data-p="1mo">1月</button>
                <button class="ptab active" data-p="3mo">3月</button>
                <button class="ptab" data-p="6mo">6月</button>
                <button class="ptab" data-p="1y">1年</button>
            </div>
            <div class="d-close" id="d-close">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </div>
        </div>
    </div>
    <div class="dchart">
        <div class="c-overlay" id="c-loading"><div class="c-spin"></div><span>加载中…</span></div>
        <div class="c-overlay hidden" id="c-empty"></div>
        <canvas id="chart"></canvas>
    </div>
</div>

<script>
const socket = io();
let stocks = {}, selected = null, chart = null, period = '3mo', filter = 'all';

const DRAWER_H = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--drawer-h')) || 340;

// ── market config ──
const mCfg = {
    cn:        { cls:'cn',        label:'A股',   color:'var(--cn)' },
    cn_yf:     { cls:'cn',        label:'A股',   color:'var(--cn)' },
    hk:        { cls:'hk',        label:'港股',  color:'var(--hk)' },
    us:        { cls:'us',        label:'美股',  color:'var(--us)' },
    commodity: { cls:'commodity', label:'商品',  color:'var(--commodity)' },
    bond:      { cls:'bond',      label:'债券',  color:'var(--bond)' },
    global:    { cls:'global',    label:'全球',  color:'var(--global)' },
};
function mGet(type) { return mCfg[type] || mCfg.global; }

// ── theme ──
const Theme = {
    init() {
        this.set(localStorage.getItem('theme') || 'dark', false);
        document.getElementById('theme-btn').onclick = () =>
            this.set(document.documentElement.dataset.theme === 'light' ? 'dark' : 'light', true);
    },
    set(t, upd) {
        document.documentElement.dataset.theme = t;
        localStorage.setItem('theme', t);
        document.getElementById('icon-moon').style.display = t === 'light' ? 'none' : 'block';
        document.getElementById('icon-sun').style.display  = t === 'light' ? 'block' : 'none';
        if (upd && chart) reloadChart();
    }
};
Theme.init();

// ── helpers ──
function fmt(price, cur) {
    if (cur === '%') return price.toFixed(2) + '%';
    return price.toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 });
}
function utag(d) {
    return d.update_label || { daily:'日更', delayed:'延迟', realtime:'实时' }[d.update_frequency] || '实时';
}
function signal(v) {
    if (!v) return null;
    if (v.signal_label && v.signal_tone) return { l:v.signal_label, t:v.signal_tone };
    const p = +v.pe_percentile;
    if (!isFinite(p)) return null;
    if (p <= 20) return { l:'加倍定投', t:'danger' };
    if (p <= 60) return { l:'正常定投', t:'warn' };
    return { l:'谨慎定投', t:'muted' };
}
function themeClrs() {
    const lt = document.documentElement.dataset.theme === 'light';
    return {
        grid: lt ? 'rgba(0,0,0,.05)'     : 'rgba(255,255,255,.04)',
        tick: lt ? '#94a3b8'             : '#3e4a5a',
        ttBg: lt ? 'rgba(255,255,255,.97)':'rgba(10,13,20,.97)',
        ttBd: lt ? 'rgba(0,0,0,.08)'     : 'rgba(255,255,255,.07)',
        ttTx: lt ? '#0f172a'             : '#e8ecf4',
    };
}

// ── build card ──
function mkCard(key, d) {
    const up   = d.change > 0, dn = d.change < 0;
    const dir  = up ? 'up' : (dn ? 'down' : 'flat');
    const arr  = up ? '▲' : (dn ? '▼' : '—');
    const sign = up ? '+' : '';
    const m    = mGet(d.type);
    const sig  = signal(d.valuation);
    const src  = d.actual_source_label || d.source_label || '';
    const surl = d.actual_source_url   || d.source_url   || '';
    const srcH = surl
        ? `<a href="${surl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${src}</a>`
        : src;
    const pc   = dir==='up'?'var(--up)':(dir==='down'?'var(--down)':'var(--text-1)');

    const pe = d.valuation ? (() => {
        const v = d.valuation;
        // 防御：既无 PE 又无价格分位就不渲染
        if (!v.is_price_percentile && (v.pe == null || v.pe === undefined)) return '';
        if (v.is_price_percentile) {
            const pct  = v.price_percentile;
            const tone = pct <= 20 ? 'danger' : pct <= 60 ? 'warn' : 'muted';
            const yrs  = v.years_of_data || '';
            const lbl  = v.signal_label || '';
            const minV = v.price_min != null ? v.price_min.toLocaleString() : '—';
            const maxV = v.price_max != null ? v.price_max.toLocaleString() : '—';
            return `
        <div class="c-pe">
            <div class="pe-l">
                <span class="pe-k">${yrs}年分位</span>
                <span class="pe-v pct-${tone}">${pct}%</span>
                <span class="pe-p pct-lbl-${tone}">${lbl}</span>
            </div>
            <span class="pe-r">${minV}–${maxV}</span>
        </div>`;
        }
        // PE 型
        const lbl = +v.years_of_data >= 9 ? '十年PE' : `${v.years_of_data}年PE`;
        return `
        <div class="c-pe">
            <div class="pe-l">
                <span class="pe-k">${lbl}</span>
                <span class="pe-v">${v.pe}</span>
                <span class="pe-p">${v.pe_percentile}%分位</span>
                ${v.dividend_yield ? `<span class="pe-dy">${v.dividend_yield}%</span>` : ''}
            </div>
            <span class="pe-r">${v.pe_min}–${v.pe_max}</span>
        </div>`;
    })() : '';

    const mType = m.cls === 'cn' ? 'cn' : m.cls;
    return `
    <div class="card ${selected===key?'active':''}"
         data-key="${key}" data-m="${mType}"
         style="--mc:${m.color}"
         draggable="true"
         onclick="pick('${key}')">
        <div class="drag-handle" title="拖动排序">
            <svg viewBox="0 0 10 14" fill="currentColor">
                <circle cx="3" cy="2"  r="1.2"/><circle cx="7" cy="2"  r="1.2"/>
                <circle cx="3" cy="7"  r="1.2"/><circle cx="7" cy="7"  r="1.2"/>
                <circle cx="3" cy="12" r="1.2"/><circle cx="7" cy="12" r="1.2"/>
            </svg>
        </div>
        <div class="c-top">
            <div>
                <div class="c-name">${d.name}</div>
                <div class="c-sym">${d.symbol}</div>
            </div>
            <div class="c-badges">
                <span class="mbadge mbadge-${m.cls}">${m.label}</span>
                ${sig ? `<span class="sbadge sbadge-${sig.t}">${sig.l}</span>` : ''}
            </div>
        </div>
        <div class="c-price" style="color:${pc}">${fmt(d.price, d.currency)}</div>
        <div class="c-chg chg-${dir}">${arr} ${sign}${d.change_pct.toFixed(2)}%</div>
        <div class="c-stats">
            <div class="cs"><div class="cs-l">最高</div><div class="cs-v">${d.high?d.high.toFixed(2):'—'}</div></div>
            <div class="cs"><div class="cs-l">最低</div><div class="cs-v">${d.low?d.low.toFixed(2):'—'}</div></div>
            <div class="cs"><div class="cs-l">昨收</div><div class="cs-v">${d.prev_close?d.prev_close.toFixed(2):'—'}</div></div>
        </div>
        ${d.cny_per_gram ? `<div class="c-cny"><span class="cny-k">人民币</span><span class="cny-v">¥${d.cny_per_gram.toFixed(2)}<span class="cny-u">/g</span></span></div>` : ''}
        ${pe}
        <div class="c-foot">
            <span class="c-src">${srcH}</span>
            <span class="upill upill-${d.update_frequency||'realtime'}">${utag(d)}</span>
        </div>
    </div>`;
}

// ── filter ──
function applyFilter(f) {
    filter = f;
    document.querySelectorAll('.ftab').forEach(t => t.classList.toggle('active', t.dataset.f === f));
    document.querySelectorAll('.card').forEach(c =>
        c.classList.toggle('hidden', f !== 'all' && c.dataset.m !== f));
}
document.getElementById('filter-bar').addEventListener('click', e => {
    const t = e.target.closest('.ftab');
    if (t) applyFilter(t.dataset.f);
});

// ── render ──
function render(data) {
    stocks = data;
    const sorted = sortByOrder(Object.entries(data));
    document.getElementById('grid').innerHTML = sorted.map(([k,v]) => mkCard(k,v)).join('');
    applyFilter(filter);
    if (selected && data[selected]) updateDrawer(selected);
}

// ── drag & drop ──
let dragSrc = null;

function initDrag() {
    const grid = document.getElementById('grid');

    grid.addEventListener('dragstart', e => {
        const card = e.target.closest('.card');
        if (!card) return;
        dragSrc = card;
        e.dataTransfer.effectAllowed = 'move';
        // delay so the ghost image captures the original style
        requestAnimationFrame(() => card.classList.add('dragging'));
    });

    grid.addEventListener('dragend', () => {
        if (dragSrc) dragSrc.classList.remove('dragging');
        document.querySelectorAll('.card.drop-before, .card.drop-after')
            .forEach(c => c.classList.remove('drop-before', 'drop-after'));
        dragSrc = null;
        persistOrder();
    });

    grid.addEventListener('dragover', e => {
        e.preventDefault();
        const target = e.target.closest('.card');
        if (!target || target === dragSrc) return;

        document.querySelectorAll('.card.drop-before, .card.drop-after')
            .forEach(c => c.classList.remove('drop-before', 'drop-after'));

        const r = target.getBoundingClientRect();
        const before = e.clientX < r.left + r.width * 0.5;
        // physically move the card in the DOM for live preview
        grid.insertBefore(dragSrc, before ? target : target.nextSibling);
        // show accent line on the new neighbour
        target.classList.add(before ? 'drop-after' : 'drop-before');
    });

    grid.addEventListener('dragenter', e => e.preventDefault());
}

// ── order persistence ──
function persistOrder() {
    const keys = [...document.querySelectorAll('#grid .card')].map(c => c.dataset.key);
    localStorage.setItem('card-order', JSON.stringify(keys));
}

function loadOrder() {
    try { return JSON.parse(localStorage.getItem('card-order')) || []; }
    catch { return []; }
}

function sortByOrder(entries) {
    const order = loadOrder();
    if (!order.length) return entries;
    return [...entries].sort(([a], [b]) => {
        const ai = order.indexOf(a), bi = order.indexOf(b);
        if (ai < 0 && bi < 0) return 0;
        if (ai < 0) return 1;
        if (bi < 0) return -1;
        return ai - bi;
    });
}

// ── 估值排序 ──
let valSortActive = false;

function getValScore(key) {
    const d = stocks[key];
    if (!d || !d.valuation) return 999;
    const v = d.valuation;
    // PE 型：用 pe_percentile；价格分位型：用 price_percentile
    return v.pe_percentile ?? v.price_percentile ?? 999;
}

function applyValSort() {
    const grid = document.getElementById('grid');
    const cards = [...grid.querySelectorAll('.card')];
    cards.sort((a, b) => getValScore(a.dataset.key) - getValScore(b.dataset.key));
    cards.forEach(c => grid.appendChild(c));
}

document.getElementById('sort-val-btn').addEventListener('click', () => {
    valSortActive = !valSortActive;
    const btn = document.getElementById('sort-val-btn');
    btn.classList.toggle('active', valSortActive);
    if (valSortActive) {
        applyValSort();
    } else {
        // 恢复自定义顺序（重新渲染）
        if (stocks) render(stocks);
    }
});

// ── pick stock ──
function pick(key) {
    selected = key;
    document.querySelectorAll('.card').forEach(c =>
        c.classList.toggle('active', c.dataset.key === key));
    updateDrawer(key);
    openDrawer();
    loadChart(key, period);
}

function updateDrawer(key) {
    const d = stocks[key]; if (!d) return;
    const up = d.change>0, dn = d.change<0;
    const dir = up?'up':(dn?'down':'flat');
    const arr = up?'▲':(dn?'▼':'—');
    const sgn = up?'+':'';
    const pc  = dir==='up'?'var(--up)':(dir==='down'?'var(--down)':'var(--text-1)');

    document.getElementById('d-name').textContent  = `${d.name} · ${d.symbol}`;
    const prEl = document.getElementById('d-price');
    prEl.textContent = fmt(d.price, d.currency);
    prEl.style.color = pc;

    const chEl = document.getElementById('d-chg');
    chEl.textContent = `${arr} ${sgn}${d.change_pct.toFixed(2)}%  (${sgn}${d.change.toFixed(2)})`;
    chEl.className   = `d-chg ${dir}`;

    const ts  = d.timestamp ? new Date(d.timestamp) : null;
    const t   = ts && !isNaN(ts) ? ts.toLocaleString('zh-CN') : '';
    const src = d.actual_source_label || d.source_label || '';
    document.getElementById('status-txt').textContent =
        [t ? `更新 ${t}` : '', src, utag(d)].filter(Boolean).join('  ·  ');
}

// ── drawer ──
function openDrawer() {
    document.getElementById('drawer').classList.add('open');
    document.getElementById('main').style.paddingBottom = (DRAWER_H + 48) + 'px';
    document.getElementById('statusbar').style.bottom = DRAWER_H + 'px';
    // 若点击的卡片被抽屉遮住，平滑滚动使其显示在抽屉上方
    requestAnimationFrame(() => {
        const activeCard = document.querySelector('.card.active');
        if (!activeCard) return;
        const rect      = activeCard.getBoundingClientRect();
        const drawerTop = window.innerHeight - DRAWER_H - 12;
        if (rect.bottom > drawerTop) {
            window.scrollBy({ top: rect.bottom - drawerTop + 16, behavior: 'smooth' });
        }
    });
}
function closeDrawer() {
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('main').style.paddingBottom = '';
    document.getElementById('statusbar').style.bottom = '0';
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    selected = null;
}
document.getElementById('d-close').addEventListener('click', closeDrawer);

// ── chart ──
function reloadChart() { if (selected) loadChart(selected, period); }

async function loadChart(key, p) {
    const d = stocks[key];
    if (d && d.history_available === false) {
        killChart(); showEmpty(d.history_note || '暂无历史图表'); hideLd(); return;
    }
    showLd();
    try {
        const res  = await fetch(`/api/history/${key}?period=${p}`);
        const data = await res.json();
        if (data && data.length) drawChart(data, d);
        else { killChart(); showEmpty('暂无历史数据'); }
    } catch { killChart(); showEmpty('加载失败'); }
    finally  { hideLd(); }
}

function killChart() { if (chart) { chart.destroy(); chart=null; } }

function drawChart(data, info) {
    hideEmpty();
    const ctx    = document.getElementById('chart').getContext('2d');
    const c      = themeClrs();
    const labels = data.map(d => d.date);
    const prices = data.map(d => d.close);
    const isUp   = prices[prices.length-1] >= prices[0];
    const lt     = document.documentElement.dataset.theme === 'light';
    const lc     = isUp ? (lt?'#dc2626':'#f04040') : (lt?'#16a34a':'#1ebb72');

    killChart();
    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels,
            datasets: [{
                data: prices,
                borderColor: lc,
                backgroundColor: lc + '14',
                borderWidth: 1.5,
                fill: true, tension: 0.3,
                pointRadius: 0, pointHoverRadius: 4,
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { intersect:false, mode:'index' },
            plugins: {
                legend: { display:false },
                tooltip: {
                    backgroundColor: c.ttBg,
                    titleColor: c.ttTx, bodyColor: c.ttTx,
                    borderColor: c.ttBd, borderWidth: 1, padding: 10,
                    callbacks: { label: x => `${info&&info.currency==='%'?'收益率':'收盘价'}: ${x.parsed.y.toFixed(2)}` }
                }
            },
            scales: {
                x: { grid:{ color:c.grid }, ticks:{ color:c.tick, maxTicksLimit:8, font:{size:11} } },
                y: { position:'right', grid:{ color:c.grid }, ticks:{ color:c.tick, font:{size:11}, callback:v=>v.toFixed(2) } }
            }
        }
    });
}

function showLd()    { hideEmpty(); document.getElementById('c-loading').classList.remove('hidden'); }
function hideLd()    { document.getElementById('c-loading').classList.add('hidden'); }
function showEmpty(m){ const e=document.getElementById('c-empty'); e.textContent=m; e.classList.remove('hidden'); }
function hideEmpty() { document.getElementById('c-empty').classList.add('hidden'); }

// ── period tabs ──
document.querySelectorAll('.ptab').forEach(t => t.addEventListener('click', function(e) {
    e.stopPropagation();
    document.querySelectorAll('.ptab').forEach(x => x.classList.remove('active'));
    this.classList.add('active');
    period = this.dataset.p;
    if (selected) loadChart(selected, period);
}));

// ── refresh ──
document.getElementById('refresh-btn').addEventListener('click', async () => {
    const btn = document.getElementById('refresh-btn');
    btn.classList.add('spinning');
    try {
        render(await (await fetch('/api/stocks?refresh=1')).json());
        if (selected) await loadChart(selected, period);
    } catch { alert('刷新失败'); }
    finally  { btn.classList.remove('spinning'); }
});

// ── socket ──
socket.on('connect',    () => { document.getElementById('conn-txt').textContent='实时'; document.getElementById('live-dot').style.background='var(--down)'; });
socket.on('disconnect', () => { document.getElementById('conn-txt').textContent='断线'; document.getElementById('live-dot').style.background='var(--up)';   });
socket.on('stock_update', data => {
    render(data);
    if (valSortActive) applyValSort();
    if (selected && data[selected]) updateDrawer(selected);
});

// ── init ──
fetch('/api/stocks').then(r=>r.json()).then(data => { render(data); initDrag(); })
    .catch(()=>{ document.getElementById('grid').innerHTML='<div style="grid-column:1/-1;text-align:center;color:var(--up);padding:48px">加载失败，请刷新页面</div>'; });
</script>
</body>
