<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title|default("市场看板 UI 设计稿") }}</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --paper: #f4f7fb;
            --panel: #ffffff;
            --panel-soft: #f8fafc;
            --ink: #172033;
            --muted: #516178;
            --faint: #75849a;
            --line: #dfe6ef;
            --blue: #2563eb;
            --blue-soft: #eaf1ff;
            --red: #e5484d;
            --green: #1aa66a;
            --amber: #d88718;
            --shadow: 0 22px 56px rgba(26, 38, 58, .10);
            --soft-shadow: 0 10px 28px rgba(26, 38, 58, .07);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            font-family: "Microsoft YaHei UI", "PingFang SC", "HarmonyOS Sans SC", sans-serif;
            color: var(--ink);
            background:
                linear-gradient(180deg, #ffffff 0, var(--paper) 240px),
                var(--paper);
            font-variant-numeric: tabular-nums;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        button {
            font: inherit;
        }

        .shell {
            width: min(1720px, calc(100vw - 48px));
            margin: 0 auto;
            padding: 20px 0 38px;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            display: grid;
            grid-template-columns: max-content minmax(0, 1fr) max-content;
            align-items: center;
            gap: 18px;
            height: 58px;
            margin-bottom: 18px;
            background: rgba(255, 255, 255, .82);
            backdrop-filter: blur(18px);
        }

        .brand {
            display: flex;
            align-items: baseline;
            gap: 9px;
            font-weight: 900;
        }

        .brand-main {
            font-size: 20px;
            letter-spacing: 0;
        }

        .brand-mark {
            color: var(--blue);
        }

        .brand-sub {
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
        }

        .tabs {
            display: inline-flex;
            align-items: center;
            justify-self: center;
            gap: 4px;
            max-width: 100%;
            padding: 4px;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: #f8fafc;
            box-shadow: inset 0 1px 0 rgba(255,255,255,.9);
        }

        .tab {
            min-width: 58px;
            height: 34px;
            padding: 0 14px;
            border: 0;
            border-radius: 10px;
            background: transparent;
            color: var(--muted);
            font-size: 13px;
            font-weight: 800;
            cursor: pointer;
        }

        .tab.active {
            background: var(--panel);
            color: var(--ink);
            box-shadow: 0 7px 18px rgba(26, 38, 58, .10);
        }

        .tools {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            justify-self: end;
            gap: 8px;
            min-width: max-content;
        }

        .live {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            white-space: nowrap;
        }

        .data-updated {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 0 9px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: rgba(255, 255, 255, .74);
            color: var(--muted);
            font-size: 11px;
            font-weight: 850;
            white-space: nowrap;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 0 5px rgba(26, 166, 106, .12);
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            display: grid;
            place-items: center;
            border: 1px solid var(--line);
            border-radius: 11px;
            background: var(--panel);
            color: var(--muted);
            cursor: pointer;
            box-shadow: var(--soft-shadow);
        }

        .icon-btn svg {
            width: 16px;
            height: 16px;
            stroke-width: 2.2;
        }

        .lang-btn {
            min-width: 42px;
            padding: 0 10px;
            font-size: 12px;
            font-weight: 950;
        }

        .summary {
            display: grid;
            grid-template-columns: 1.2fr repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 18px;
        }

        .summary-card {
            min-height: 78px;
            padding: 14px 16px;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: var(--panel);
            box-shadow: var(--soft-shadow);
        }

        .summary-k {
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .summary-v {
            color: var(--ink);
            font-size: 19px;
            font-weight: 900;
            line-height: 1.25;
        }

        .summary-note {
            margin-top: 6px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.5;
        }

        .workspace {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(520px, 620px);
            align-items: start;
            gap: 18px;
        }

        .workspace.sparse {
            grid-template-columns: minmax(460px, 620px) minmax(620px, 720px);
            justify-content: center;
        }

        .workspace.sparse .cards {
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 12px;
            align-items: stretch;
            align-content: start;
        }

        .card {
            position: relative;
            min-height: 226px;
            padding: 16px;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: var(--panel);
            box-shadow: var(--soft-shadow);
            cursor: pointer;
            transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0 0 auto;
            height: 3px;
            background: var(--market);
            opacity: .75;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
            border-color: color-mix(in srgb, var(--market) 36%, var(--line));
        }

        .card.active {
            border-color: var(--market);
            box-shadow: 0 0 0 1px color-mix(in srgb, var(--market) 38%, transparent), var(--shadow);
        }

        .card-head {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
        }

        .name {
            font-size: 16px;
            line-height: 1.25;
            font-weight: 900;
            color: var(--ink);
        }

        .symbol {
            margin-top: 4px;
            color: var(--faint);
            font-size: 11px;
            font-family: "Bahnschrift", Consolas, monospace;
            font-weight: 700;
        }

        .badges {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
            flex-shrink: 0;
        }

        .badge {
            padding: 3px 8px;
            border-radius: 999px;
            background: var(--badge-bg);
            color: var(--badge-fg);
            font-size: 11px;
            font-weight: 900;
            white-space: nowrap;
        }

        .signal {
            padding: 3px 8px;
            border-radius: 999px;
            background: #f2f5f9;
            color: var(--muted);
            font-size: 10px;
            font-weight: 900;
            white-space: nowrap;
        }

        .signal.danger {
            background: #ffecec;
            color: var(--red);
        }

        .signal.warn {
            background: #fff6e5;
            color: var(--amber);
        }

        .trust {
            padding: 3px 8px;
            border-radius: 999px;
            background: #eef2f7;
            color: var(--muted);
            font-size: 10px;
            font-weight: 900;
            white-space: nowrap;
        }

        .trust.official {
            background: #e7f8ef;
            color: #137a45;
        }

        .trust.third {
            background: #fff6e5;
            color: #a35d00;
        }

        .trust.warn {
            background: #ffecec;
            color: var(--red);
        }

        .price {
            color: var(--tone);
            font-family: "Bahnschrift", "DIN Alternate", Consolas, monospace;
            font-size: 30px;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 9px;
        }

        .change {
            display: inline-flex;
            align-items: center;
            padding: 4px 9px;
            border-radius: 999px;
            background: var(--tone-soft);
            color: var(--tone);
            font-size: 12px;
            font-weight: 900;
            margin-bottom: 14px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            border-top: 1px solid var(--line);
            padding-top: 11px;
            gap: 0;
        }

        .stat {
            text-align: center;
        }

        .stat:not(:last-child) {
            border-right: 1px solid var(--line);
        }

        .stat-k {
            color: var(--faint);
            font-size: 10px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .stat-v {
            color: #334155;
            font-family: "Bahnschrift", Consolas, monospace;
            font-size: 12px;
            font-weight: 850;
        }

        .valuation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            padding: 8px 9px;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: var(--panel-soft);
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
        }

        .valuation strong {
            color: var(--blue);
            font-size: 12px;
        }

        .source {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 12px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 700;
        }

        .cadence {
            padding: 3px 8px;
            border-radius: 999px;
            background: var(--blue-soft);
            color: var(--blue);
            font-size: 10px;
            font-weight: 900;
        }

        .chart-shell {
            position: sticky;
            top: 82px;
            z-index: 10;
            width: 100%;
            height: min(650px, calc(100vh - 110px));
            min-height: 520px;
            opacity: 1;
            pointer-events: auto;
        }

        .chart-shell.open {
            opacity: 1;
            pointer-events: auto;
        }

        .chart-panel {
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
            height: 100%;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: rgba(255,255,255,.96);
            box-shadow: 0 24px 70px rgba(26, 38, 58, .16);
            overflow: hidden;
            backdrop-filter: blur(18px);
        }

        .chart-side {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 6px 18px;
            align-items: start;
            padding: 18px 20px 16px;
            border-right: 0;
            border-bottom: 1px solid var(--line);
            background: linear-gradient(180deg, #ffffff, #f8fafc);
        }

        .chart-eyebrow {
            color: var(--muted);
            font-size: 12px;
            font-weight: 900;
            margin-bottom: 8px;
        }

        .chart-name {
            font-size: 20px;
            font-weight: 950;
            line-height: 1.25;
            margin-bottom: 0;
        }

        .chart-price {
            color: var(--chart-tone);
            font-family: "Bahnschrift", Consolas, monospace;
            font-size: 34px;
            font-weight: 900;
            margin-bottom: 4px;
            text-align: right;
            white-space: nowrap;
        }

        .chart-change {
            color: var(--chart-tone);
            font-size: 13px;
            font-weight: 900;
            text-align: right;
        }

        .chart-meta {
            grid-column: 1 / -1;
            display: flex;
            flex-wrap: wrap;
            gap: 8px 14px;
            margin-top: 8px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.45;
        }

        .chart-main {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .chart-toolbar {
            min-height: 54px;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 16px 10px;
            border-bottom: 1px solid var(--line);
            overflow: visible;
        }

        .switches {
            display: flex;
            align-items: flex-start;
            align-content: flex-start;
            flex-wrap: wrap;
            gap: 8px;
            min-width: 0;
            width: 100%;
            overflow: visible;
            scrollbar-width: none;
        }

        .switches::-webkit-scrollbar {
            display: none;
        }

        .seg {
            flex: 0 1 auto;
            max-width: 100%;
            display: inline-flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 3px;
            padding: 3px;
            border: 1px solid var(--line);
            border-radius: 11px;
            background: var(--panel-soft);
        }

        .seg button {
            height: 30px;
            padding: 0 11px;
            border: 0;
            border-radius: 8px;
            background: transparent;
            color: var(--muted);
            font-size: 12px;
            font-weight: 900;
            cursor: pointer;
            line-height: 1;
            white-space: nowrap;
        }

        .seg button.active {
            background: var(--panel);
            color: var(--blue);
            box-shadow: 0 6px 14px rgba(26, 38, 58, .10);
        }

        .close {
            display: none;
        }

        .chart-area {
            position: relative;
            flex: 1;
            min-height: 0;
            padding: 16px 18px 18px;
        }

        .chart-area canvas {
            width: 100% !important;
            height: 100% !important;
        }

        .empty {
            position: absolute;
            inset: 0;
            display: none;
            place-items: center;
            color: var(--muted);
            font-size: 13px;
            font-weight: 800;
            background: var(--panel);
        }

        .empty.show {
            display: grid;
        }

        @media (max-width: 980px) {
            .shell {
                width: min(100vw - 28px, 760px);
                padding-bottom: 28px;
            }

            .topbar {
                grid-template-columns: 1fr auto;
                height: auto;
                padding: 12px 0;
            }

            .tabs {
                grid-column: 1 / -1;
                justify-self: stretch;
                flex-wrap: wrap;
                overflow: visible;
            }

            .tools {
                min-width: 0;
                flex-wrap: wrap;
            }

            .data-updated {
                flex: 0 0 auto;
            }

            .summary {
                grid-template-columns: 1fr;
            }

            .cards {
                grid-template-columns: 1fr;
            }

            .workspace {
                grid-template-columns: 1fr;
            }

            .chart-shell {
                position: relative;
                top: auto;
                height: 520px;
                min-height: 520px;
            }

            .chart-panel {
                grid-template-rows: auto minmax(0, 1fr);
            }

            .chart-side {
                border-bottom: 1px solid var(--line);
                padding: 16px 18px;
            }

            .chart-meta {
                display: flex;
            }

            .chart-toolbar {
                align-items: flex-start;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <div class="brand">
                <div class="brand-main">市场<span class="brand-mark">看板</span></div>
                {% if brand_sub|default("") %}
                <div class="brand-sub">{{ brand_sub }}</div>
                {% endif %}
            </div>

            <nav class="tabs" id="filter">
                <button class="tab active" data-filter="all">全部</button>
                <button class="tab" data-filter="cn_broad">A股宽基</button>
                <button class="tab" data-filter="cn_sector">A股行业</button>
                <button class="tab" data-filter="dividend_low_vol">红利低波</button>
                <button class="tab" data-filter="hk">港股</button>
                <button class="tab" data-filter="us">美股</button>
                <button class="tab" data-filter="commodity">商品</button>
                <button class="tab" data-filter="bond">债券</button>
                <button class="tab" data-filter="global">全球</button>
                <button class="tab" data-filter="risk">风险</button>
                <button class="tab" data-filter="crypto">加密</button>
                <button class="tab" data-filter="fx">外汇</button>
            </nav>

            <div class="tools">
                <div class="live"><span class="dot" id="live-dot"></span><span id="conn-txt">实时连接</span></div>
                <div class="data-updated" id="beijing-time">北京时间 --</div>
                <div class="data-updated" id="data-updated">数据更新时间 --</div>
                <button class="icon-btn lang-btn" id="language-toggle" title="Switch language">EN</button>
                <button class="icon-btn" id="refresh" title="刷新">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M21 12a9 9 0 0 1-15.4 6.4M3 12A9 9 0 0 1 18.4 5.6"/>
                        <path d="M21 4v6h-6M3 20v-6h6"/>
                    </svg>
                </button>
            </div>
        </header>

        <section class="summary">
            <div class="summary-card">
                <div class="summary-k">今日视图</div>
                <div class="summary-v">估值优先，行情次之</div>
                <div class="summary-note">顶部保留筛选；说明区收成摘要，不再占用大面积。</div>
            </div>
            <div class="summary-card">
                <div class="summary-k">曲线图</div>
                <div class="summary-v">右侧完整显示</div>
                <div class="summary-note">不再放底部浮层，避免被屏幕高度裁掉。</div>
            </div>
            <div class="summary-card">
                <div class="summary-k">卡片密度</div>
                <div class="summary-v" id="summary-count">加载中</div>
                <div class="summary-note">更少装饰，更清楚的数字层级。</div>
            </div>
            <div class="summary-card">
                <div class="summary-k">数据口径</div>
                <div class="summary-v">卡片内展示</div>
                <div class="summary-note">来源和更新频率仍保留在底部。</div>
            </div>
        </section>

        <section class="workspace">
            <main class="cards" id="cards">
                <div class="summary-card">正在加载数据...</div>
            </main>

            <section class="chart-shell" id="chart-shell">
                <div class="chart-panel">
                    <aside class="chart-side" id="chart-side">
                        <div>
                            <div class="chart-eyebrow">趋势观察</div>
                            <div class="chart-name" id="chart-name">请选择标的</div>
                        </div>
                        <div>
                            <div class="chart-price" id="chart-price">--</div>
                            <div class="chart-change" id="chart-change">--</div>
                        </div>
                        <div class="chart-meta">
                            <div id="chart-source">来源 --</div>
                            <div id="chart-time">时间 --</div>
                            <div id="chart-quality">可信口径 --</div>
                            <div id="chart-hint">右侧焦点图表固定可见，筛选后自动切换到当前分类。</div>
                        </div>
                    </aside>
                    <div class="chart-main">
                        <div class="chart-toolbar">
                            <div class="switches">
                                <div class="seg" id="series-tabs"></div>
                                <div class="seg" id="period-tabs">
                                    <button data-period="1mo">1月</button>
                                    <button data-period="3mo" class="active">3月</button>
                                    <button data-period="6mo">6月</button>
                                    <button data-period="1y">1年</button>
                                    <button data-period="10y">10年</button>
                                    <button data-period="all">成立以来</button>
                                </div>
                            </div>
                            <button class="close" id="close">×</button>
                        </div>
                        <div class="chart-area">
                            <div class="empty" id="empty">暂无历史数据</div>
                            <canvas id="chart"></canvas>
                        </div>
                    </div>
                </div>
            </section>
        </section>
    </div>

    <script>
        let stocks = {};
        let selected = null;
        let filter = "all";
        let period = "3mo";
        let series = "price";
        let chart = null;
        const chartCache = new Map();
        const socket = typeof io === "function" ? io() : null;
        let socketConnected = Boolean(socket && socket.connected);
        let lang = localStorage.getItem("dashboardLanguage") || "zh";
        if (!["zh", "en"].includes(lang)) lang = "zh";

        const i18n = {
            zh: {
                brandMarket: "市场",
                brandBoard: "看板",
                connected: "实时连接",
                disconnected: "连接断开",
                refresh: "刷新",
                beijingTime: "北京",
                beijingTimeEmpty: "北京 --",
                dataUpdated: "数据",
                dataUpdatedEmpty: "数据 --",
                switchLanguage: "Switch to English",
                filters: {
                    all: "全部",
                    cn: "A股",
                    cn_broad: "A股宽基",
                    cn_sector: "A股行业",
                    dividend_low_vol: "红利低波",
                    hk: "港股",
                    us: "美股",
                    commodity: "商品",
                    bond: "债券",
                    global: "全球",
                    risk: "风险",
                    crypto: "加密",
                    fx: "外汇",
                },
                summary: [
                    ["今日视图", "估值优先，行情次之", "顶部保留筛选；说明区收成摘要，不再占用大面积。"],
                    ["曲线图", "右侧完整显示", "不再放底部浮层，避免被屏幕高度裁掉。"],
                    ["卡片密度", "加载中", "更少装饰，更清楚的数字层级。"],
                    ["数据口径", "卡片内展示", "来源和更新频率仍保留在底部。"],
                ],
                loading: "正在加载数据...",
                chartEyebrow: "趋势观察",
                pickSymbol: "请选择标的",
                source: "来源",
                time: "时点",
                quality: "可信口径",

            node.textContent = latest ? `${tr("dataUpdated")} ${formatCompactDateTime(latest)}` : tr("dataUpdatedEmpty");

        function beijingDateTimeParts(date = new Date()) {
            const parts = new Intl.DateTimeFormat("zh-CN", {
                timeZone: "Asia/Shanghai",
                hour12: false,
                hourCycle: "h23",
                year: "numeric",
                month: "2-digit",
                day: "2-digit",
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit",
            }).formatToParts(date).reduce((acc, part) => {
                acc[part.type] = part.value;
                return acc;
            }, {});
            return parts;
        }

        function formatBeijingDateTime(date = new Date()) {
            const parts = beijingDateTimeParts(date);
            return `${parts.year}-${parts.month}-${parts.day} ${parts.hour}:${parts.minute}:${parts.second}`;
        }

        function formatBeijingClock(date = new Date()) {
            const parts = beijingDateTimeParts(date);
            return `${parts.hour}:${parts.minute}:${parts.second}`;
        }

        function updateBeijingTimeLabel() {
            const node = document.getElementById("beijing-time");
            if (!node) return;
            node.textContent = `${tr("beijingTime")} ${formatBeijingClock()}`;

        const dividendLowVolKeys = new Set([
            "CSI_DIVIDEND",
            "CSI_DIVIDEND_100",
            "CSI300_DIVIDEND_LOW_VOL",
            "CSI_DIVIDEND_QUALITY",

        const markets = {
            cn: { label: "A股", color: "#e5484d", bg: "#fff0f0", fg: "#e5484d" },
            hk: { label: "港股", color: "#d88718", bg: "#fff6e5", fg: "#b96a00" },

        function market(type) {
            return markets[type] || markets.global;

        function fmt(value, currency) {
            if (value == null || Number.isNaN(+value)) return "--";
            if (currency === "%") return (+value).toFixed(2) + "%";
            const digits = Math.abs(+value) < 10 ? 4 : 2;
            return (+value).toLocaleString("en-US", { minimumFractionDigits: digits, maximumFractionDigits: digits });
        }

        function tone(change) {
            if (+change > 0) return { color: "var(--red)", soft: "#ffeded", arrow: "▲", sign: "+" };
            if (+change < 0) return { color: "var(--green)", soft: "#e8f8f0", arrow: "▼", sign: "" };
            return { color: "var(--muted)", soft: "#eef2f7", arrow: "—", sign: "" };
        }

        function signalClass(valuation) {
            const t = valuation && valuation.signal_tone;
            if (t === "danger") return "danger";
            if (t === "warn") return "warn";
            return "";
        }

        function trustClass(trust) {
            const tone = trust && trust.tone;
            if (tone === "official") return "official";
            if (tone === "third") return "third";
            if (tone === "warn") return "warn";
            return "";
        }

        function trustBadge(d) {
            const trust = d.source_trust || {};
            const label = localizedTrustLabel(trust.label || "待核验");
            const note = localizedTrustNote(trust.note || "来源口径待核验");
            return `<div class="trust ${trustClass(trust)}" title="${note}">${label}</div>`;
        }

        function qualityText(d) {
            const trust = d.source_trust || {};
            const flags = d.data_quality_flags || [];
            const flagText = flags.length
                ? (lang === "zh" ? `；提示 ${flags.map(localizedFlag).join(", ")}` : `; flags: ${flags.map(localizedFlag).join(", ")}`)
                : "";
            return `${localizedTrustLabel(trust.label || "待核验")}: ${localizedTrustNote(trust.note || "来源口径待核验")}${flagText}`;
        }

        function valuationTitle(d) {
            const v = d.valuation || {};
            const parts = [];
            if (v.source) parts.push(`${tr("valuation.source")}: ${localizedSource(v.source)}`);
            if (v.data_end) parts.push(`${tr("valuation.until")}: ${v.data_end}`);
            if (v.note) parts.push(localizedFreeText(v.note));
            return parts.join(lang === "zh" ? "；" : "; ");
        }

        function valuationText(d) {
            const v = d.valuation;
            if (!v) return "";
            if (v.is_price_percentile) {
                const yrs = v.years_of_data || "";
                const pct = v.price_percentile ?? "--";
                const label = localizedSignal(v.signal_label || "历史分位");
                const isYield = v.valuation_type === "yield_percentile";
                const yearsText = lang === "zh"
                    ? `${yrs}年${isYield ? "收益率/利差分位" : "价格分位"}`
                    : `${yrs}${isYield ? "Y yield/spread pct." : tr("valuation.yearsPercentile")}`;
                return `<span>${yearsText} <strong>${pct}%</strong></span><span>${label}</span>`;
            }
            if (v.pe == null) return "";
            const years = +v.years_of_data >= 9
                ? tr("valuation.tenYearPE")
                : (lang === "zh" ? `${v.years_of_data || ""}年PE` : `${v.years_of_data || ""}${tr("valuation.pe")}`);
            return `<span>${years} <strong>${v.pe}</strong></span><span>${v.pe_percentile}%${tr("valuation.percentile")}</span>`;
        }

        function riskMetricsText(d) {
            const r = d.risk_metrics;
            if (!r) return "";
            const distance = Number(r.distance_10y_high_pct);
            const drawdown = Number(r.max_drawdown_pct);
            if (!Number.isFinite(distance) || !Number.isFinite(drawdown)) return "";
            return `<span>${tr("risk.distance")} <strong>${distance.toFixed(2)}%</strong></span><span>${tr("risk.maxDrawdown")} ${drawdown.toFixed(2)}%</span>`;
        }

        function seriesOptions(d) {
            const configured = d && d.history_series ? d.history_series : {};
            return fixedSeriesOptions.filter(item => {
                if (item.key === "total_return") {
                    return Boolean(configured.total_return && configured.total_return.has_data);
                }
                if (item.key === "both") {
                    return Boolean(
                        configured.total_return &&
                        configured.total_return.has_data &&
                        configured.total_return.can_compare_total_return
                    );
                }
                if (item.key === "dividend_return" || item.key === "dividend_yield") {
                    const dividendSeries = configured[item.key];
                    return Boolean(dividendSeries && dividendSeries.has_data);
                }
                return true;
            }).map(item => {
                const cfg = configured[item.key] || {};
                const rawLabel = cfg.label || item.label;
                return {
                    ...item,
                    rawLabel,
                    label: item.key === "total_return" && cfg.return_kind
                        ? localizedReturnKind(cfg.return_kind, cfg.return_kind_label || rawLabel)
                        : localizedSeriesLabel(item.key, rawLabel),
                    trust: cfg.trust || null,
                    source: cfg.source || "",
                    symbol: cfg.symbol || "",
                    return_kind: cfg.return_kind || "none",
                    can_compare_total_return: Boolean(cfg.can_compare_total_return),
                };
            });
        }

        function cardHtml(key, d) {
            const m = market(d.type);
            const direction = tone(d.change);
            const vhtml = valuationText(d);
            const riskHtml = riskMetricsText(d);
            const update = localizedUpdate(d);
            const signal = d.valuation && d.valuation.signal_label
                ? `<div class="signal ${signalClass(d.valuation)}">${localizedSignal(d.valuation.signal_label)}</div>`
                : "";
            const vtitle = valuationTitle(d);
            return `
                <article class="card ${selected === key ? "active" : ""}" data-key="${key}" data-market="${d.type}" style="--market:${m.color};--tone:${direction.color};--tone-soft:${direction.soft};--badge-bg:${m.bg};--badge-fg:${m.fg}">
                    <div class="card-head">
                        <div>
                            <div class="name">${localizedName(key, d)}</div>
                            <div class="symbol">${d.symbol}</div>
                        </div>
                        <div class="badges">
                            <div class="badge">${marketLabel(d.type)}</div>
                            ${trustBadge(d)}
                            ${signal}
                        </div>
                    </div>
                    <div class="price">${fmt(d.price, d.currency)}</div>
                    <div class="change">${direction.arrow} ${direction.sign}${(+d.change_pct || 0).toFixed(2)}%</div>
                    <div class="stats">
                        <div class="stat"><div class="stat-k">${tr("stats.high")}</div><div class="stat-v">${fmt(d.high, "")}</div></div>
                        <div class="stat"><div class="stat-k">${tr("stats.low")}</div><div class="stat-v">${fmt(d.low, "")}</div></div>
                        <div class="stat"><div class="stat-k">${tr("stats.prev")}</div><div class="stat-v">${fmt(d.prev_close, "")}</div></div>
                    </div>
                    ${vhtml ? `<div class="valuation" title="${vtitle}">${vhtml}</div>` : ""}
                    ${riskHtml ? `<div class="valuation" title="${tr("risk.title")}">${riskHtml}</div>` : ""}
                    <div class="source"><span>${localizedSource(d.actual_source_label || d.source_label || tr("dataSource"))}</span><span class="cadence">${update}</span></div>
                </article>

        }

        function visibleEntries() {
            return Object.entries(stocks).filter(([key, d]) => {
                if (filter === "all") return true;
                if (filter === "dividend_low_vol") return dividendLowVolKeys.has(key);
                if (filter === "cn_broad") return cnBroadKeys.has(key);
                if (filter === "cn_sector") {
                    return d.type === "cn" && !cnBroadKeys.has(key) && !dividendLowVolKeys.has(key);
                }
                return d.type === filter;
            });
        }

        function render() {
            const entries = visibleEntries();
            document.querySelector(".workspace").classList.toggle("sparse", entries.length > 0 && entries.length <= 3);
            document.getElementById("cards").innerHTML = entries.map(([key, d]) => cardHtml(key, d)).join("");
            document.getElementById("summary-count").textContent = `${entries.length} ${tr("countSuffix")}`;
            document.querySelectorAll(".card").forEach(card => {
                card.addEventListener("click", () => pick(card.dataset.key));
            });
        }

        function setFilter(next) {
            filter = next;
            document.querySelectorAll("#filter .tab").forEach(btn => btn.classList.toggle("active", btn.dataset.filter === filter));
            const entries = visibleEntries();
            if (entries.length && !entries.some(([key]) => key === selected)) {
                pick(entries[0][0]);
                return;
            }
            render();
        }

        function updateSeriesTabs(d) {
            const tabs = document.getElementById("series-tabs");
            const opts = seriesOptions(d);
            if (!opts.some(item => item.key === series)) series = "price";
            tabs.style.display = "inline-flex";
            tabs.innerHTML = opts.map(item => {
                const title = item.trust && item.trust.note ? localizedTrustNote(item.trust.note) : item.label;
                return `<button data-series="${item.key}" class="${item.key === series ? "active" : ""}" title="${title}">${item.label}</button>`;
            }).join("");
        }

        function updatePeriodTabs(d) {
            const tabs = document.getElementById("period-tabs");
            const activeSeries = seriesOptions(d).find(item => item.key === series);
            const seriesConfigKey = activeSeries && activeSeries.key === "both" ? "total_return" : activeSeries && activeSeries.key;
            const seriesConfig = seriesConfigKey && d.history_series ? d.history_series[seriesConfigKey] : null;
            const allowed = seriesConfig && seriesConfig.allowed_periods && seriesConfig.allowed_periods.length
                ? seriesConfig.allowed_periods
                : (d.allowed_periods && d.allowed_periods.length ? d.allowed_periods : fixedPeriodOptions.map(item => item.key));
            if (!allowed.includes(period)) {
                period = allowed.includes("3mo") ? "3mo" : allowed[allowed.length - 1];
            }
            tabs.innerHTML = fixedPeriodOptions
                .filter(item => allowed.includes(item.key))
                .map(item => `<button data-period="${item.key}" class="${item.key === period ? "active" : ""}">${tr(`periods.${item.key}`)}</button>`)
                .join("");
        }

        function updateChartSide(key) {
            const d = stocks[key];
            const direction = tone(d.change);
            const activeSeries = seriesOptions(d).find(item => item.key === series);
            const seriesSource = activeSeries && activeSeries.source ? activeSeries.source : "";
            const sourceText = localizedSource(d.actual_source_label || d.source_label || "--");
            const seriesSourceText = seriesSource && series !== "price"
                ? `${sourceText} · ${activeSeries.label}: ${localizedSource(seriesSource)}`
                : sourceText;
            document.getElementById("chart-shell").style.setProperty("--chart-tone", direction.color);
            document.getElementById("chart-name").textContent = `${localizedName(key, d)} · ${d.symbol}`;
            document.getElementById("chart-price").textContent = fmt(d.price, d.currency);
            document.getElementById("chart-change").textContent = `${direction.arrow} ${direction.sign}${(+d.change_pct || 0).toFixed(2)}% (${direction.sign}${fmt(d.change, "")})`;
            document.getElementById("chart-source").textContent = `${tr("source")} ${seriesSourceText}`;
            document.getElementById("chart-time").textContent = `${tr("time")} ${d.data_as_of || "--"}`;
            document.getElementById("chart-quality").textContent = `${tr("quality")} ${qualityText(d)}`;
        }

        async function pick(key) {
            if (selected !== key) series = "price";
            selected = key;
            render();
            updateSeriesTabs(stocks[key]);
            updatePeriodTabs(stocks[key]);
            updateChartSide(key);
            document.getElementById("chart-shell").classList.add("open");
            await loadChart();
        }

        async function loadChart() {
            if (!selected) return;
            const empty = document.getElementById("empty");
            empty.classList.remove("show");
            empty.textContent = tr("empty.noHistory");
            try {
                if (series === "both") {
                    const payload = await fetchCompareRows(selected, period);
                    if ((!payload.price || !payload.price.length) && (!payload.total || !payload.total.length)) {
                        if (chart) chart.destroy();
                        chart = null;
                        empty.textContent = localizedCompareNote(payload.note) || tr("empty.noCompare");
                        empty.classList.add("show");
                        return;
                    }
                    drawCompareChart(payload, stocks[selected]);
                    return;
                }

                const rows = await fetchHistoryRows(selected, period, series);
                if (!rows || !rows.length) {
                    if (chart) chart.destroy();
                    chart = null;
                    const label = seriesOptions(stocks[selected]).find(item => item.key === series)?.label || "该口径";
                    empty.textContent = series === "total_return"
                        ? (lang === "zh" ? `暂无${label}历史数据；当前免费/官方源未提供该标的全收益曲线。` : tr("empty.noSeries"))
                        : (series === "dividend_return" || series === "dividend_yield")
                            ? (lang === "zh" ? `暂无${label}历史数据；当前免费/官方源未返回该标的曲线。` : tr("empty.noDividendYield"))
                            : (lang === "zh" ? `暂无${periodLabel(period)}历史数据；当前数据源未提供这个周期。` : tr("empty.noPeriod"));
                    empty.classList.add("show");
                    return;
                }
                drawChart(rows, stocks[selected], series);
            } catch {
                if (chart) chart.destroy();
                chart = null;
                empty.textContent = tr("empty.failed");
                empty.classList.add("show");
            }
        }

        function periodLabel(value) {
            const label = tr(`periods.${value}`);
            return label === `periods.${value}` ? value : label;
        }

        async function fetchHistoryRows(key, nextPeriod, nextSeries) {
            const cacheKey = `${key}|${nextPeriod}|${nextSeries}`;
            if (chartCache.has(cacheKey)) return chartCache.get(cacheKey);
            const params = new URLSearchParams({
                period: nextPeriod,
                series: nextSeries,
                max_points: nextPeriod === "all" ? "1100" : "900",
            });
            const res = await fetch(`/api/history/${key}?${params.toString()}`);
            const rows = await res.json();
            chartCache.set(cacheKey, rows || []);
            return rows || [];
        }

        async function fetchCompareRows(key, nextPeriod) {
            const cacheKey = `${key}|${nextPeriod}|compare`;
            if (chartCache.has(cacheKey)) return chartCache.get(cacheKey);
            const params = new URLSearchParams({
                period: nextPeriod,
                max_points: nextPeriod === "all" ? "1100" : "900",
            });
            const res = await fetch(`/api/history-compare/${key}?${params.toString()}`);
            const payload = await res.json();
            const safePayload = payload || { price: [], total: [], note: "" };
            chartCache.set(cacheKey, safePayload);
            return safePayload;
        }

        function isPercentChartSeries(info, seriesKey) {
            return seriesKey === "dividend_return" || seriesKey === "dividend_yield" || info.currency === "%";
        }

        function movingAverage(values, windowSize = 63) {
            const result = [];
            let sum = 0;
            let count = 0;
            const queue = [];
            values.forEach(value => {
                const numeric = Number(value);
                if (Number.isFinite(numeric)) {
                    queue.push(numeric);
                    sum += numeric;
                    count += 1;
                } else {
                    queue.push(null);
                }
                if (queue.length > windowSize) {
                    const removed = queue.shift();
                    if (Number.isFinite(removed)) {
                        sum -= removed;
                        count -= 1;
                    }
                }
                result.push(count ? sum / count : null);
            });
            return result;
        }

        function percentSeriesLabel(seriesKey) {
            if (seriesKey === "dividend_return") return tr("chart.dividendReturn");
            if (seriesKey === "dividend_yield") return tr("chart.dividendYield");
            return tr("chart.yield");
        }

        function drawChart(rows, info, seriesKey = "price") {
            const ctx = document.getElementById("chart").getContext("2d");
            const prices = rows.map(row => row.close);
            const labels = rows.map(row => row.date);
            const isUp = prices[prices.length - 1] >= prices[0];
            const color = isUp ? "#e5484d" : "#1aa66a";
            const percentSeries = isPercentChartSeries(info, seriesKey);
            const datasets = seriesKey === "dividend_return"
                ? [
                    {
                        label: tr("chart.original"),
                        data: prices,
                        borderColor: "rgba(229,72,77,.28)",
                        backgroundColor: "transparent",
                        borderWidth: 1,
                        fill: false,
                        tension: .12,
                        pointRadius: 0,
                        pointHoverRadius: 3,
                    },
                    {
                        label: tr("chart.smoothed"),
                        data: movingAverage(prices, 63),
                        borderColor: "#e5484d",
                        backgroundColor: "rgba(229,72,77,.10)",
                        borderWidth: 2.2,
                        fill: true,
                        tension: .32,
                        pointRadius: 0,
                        pointHoverRadius: 4,
                    },
                ]
                : [{
                    label: percentSeries ? percentSeriesLabel(seriesKey) : tr("chart.close"),
                    data: prices,
                    borderColor: color,
                    backgroundColor: color + "12",
                    borderWidth: 1.8,
                    fill: true,
                    tension: .28,
                    pointRadius: 0,
                    pointHoverRadius: 4,
                }];
            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: "line",
                data: {
                    labels,
                    datasets,
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { intersect: false, mode: "index" },
                    plugins: {
                        legend: { display: seriesKey === "dividend_return", labels: { color: "#516178", boxWidth: 10, usePointStyle: true } },
                        tooltip: {
                            backgroundColor: "rgba(23,32,51,.94)",
                            titleColor: "#fff",
                            bodyColor: "#fff",
                            padding: 10,
                            callbacks: {
                                label: item => `${item.dataset.label || (percentSeries ? percentSeriesLabel(seriesKey) : tr("chart.close"))}: ${(+item.parsed.y).toFixed(2)}${percentSeries ? "%" : ""}`,
                            },
                        },
                    },
                    scales: {
                        x: {
                            grid: { color: "rgba(105,119,141,.13)" },
                            ticks: { color: "#7b8798", maxTicksLimit: 7, font: { size: 11 } },
                        },
                        y: {
                            position: "right",
                            grid: { color: "rgba(105,119,141,.13)" },
                            ticks: { color: "#7b8798", font: { size: 11 }, callback: value => `${(+value).toFixed(2)}${percentSeries ? "%" : ""}` },
                        },
                    },
                },
            });
        }

        function formatRawValue(value) {
            if (value == null || Number.isNaN(+value)) return "--";
            const num = Number(value);
            return num.toLocaleString("en-US", {
                minimumFractionDigits: Math.abs(num) < 10 ? 4 : 2,
                maximumFractionDigits: Math.abs(num) < 10 ? 4 : 2,
            });
        }

        function labelForSeries(info, key, fallback) {
            return seriesOptions(info).find(item => item.key === key)?.label || fallback;
        }

        function compareDataset(label, rows, labels, color, fillColor) {
            const byDate = new Map(rows.map(row => [row.date, row]));
            const rawValues = labels.map(date => byDate.get(date)?.raw ?? null);
            return {
                label,
                data: labels.map(date => {
                    const row = byDate.get(date);
                    return row ? (row.value ?? row.close) : null;
                }),
                rawValues,
                borderColor: color,
                backgroundColor: fillColor,
                borderWidth: 1.8,
                fill: false,
                tension: .28,
                pointRadius: 0,
                pointHoverRadius: 4,
                spanGaps: true,
            };
        }

        function drawCompareChart(payload, info) {
            const empty = document.getElementById("empty");
            const priceRows = payload.price || [];
            const totalRows = payload.total || [];
            const labels = [...new Set([...priceRows.map(row => row.date), ...totalRows.map(row => row.date)])].sort();
            if (!labels.length) {
                if (chart) chart.destroy();
                chart = null;
                empty.textContent = localizedCompareNote(payload.note) || tr("empty.noComparable");
                empty.classList.add("show");
                return;
            }

            empty.classList.remove("show");
            const ctx = document.getElementById("chart").getContext("2d");
            const datasets = [];
            if (priceRows.length) {
                datasets.push(compareDataset(
                    labelForSeries(info, "price", tr("series.price")),
                    priceRows,
                    labels,
                    "#2563eb",
                    "rgba(37,99,235,.08)"
                ));
            }
            if (totalRows.length) {
                datasets.push(compareDataset(
                    labelForSeries(info, "total_return", tr("series.total_return")),
                    totalRows,
                    labels,
                    "#e5484d",
                    "rgba(229,72,77,.08)"
                ));
            }

            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: "line",
                data: { labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { intersect: false, mode: "index" },
                    plugins: {
                        legend: { display: true, labels: { color: "#516178", boxWidth: 10, usePointStyle: true } },
                        tooltip: {
                            backgroundColor: "rgba(23,32,51,.94)",
                            titleColor: "#fff",
                            bodyColor: "#fff",
                            padding: 10,
                            callbacks: {
                                label: item => {
                                    const raw = item.dataset.rawValues?.[item.dataIndex];
                                    const rawText = raw == null ? "" : (lang === "zh" ? `，原值 ${formatRawValue(raw)}` : `, ${tr("chart.raw")} ${formatRawValue(raw)}`);
                                    const note = localizedCompareNote(payload.note);
                                    return `${item.dataset.label}: ${(+item.parsed.y).toFixed(2)} (${note}${rawText})`;
                                },
                            },
                        },
                    },
                    scales: {
                        x: {
                            grid: { color: "rgba(105,119,141,.13)" },
                            ticks: { color: "#7b8798", maxTicksLimit: 7, font: { size: 11 } },
                        },
                        y: {
                            position: "right",
                            grid: { color: "rgba(105,119,141,.13)" },
                            ticks: { color: "#7b8798", font: { size: 11 }, callback: value => (+value).toFixed(1) },
                        },
                    },
                },
            });
        }

        async function loadStocks(force = false) {
            if (force) chartCache.clear();
            const res = await fetch(`/api/stocks${force ? "?refresh=1" : ""}`);
            stocks = await res.json();
            updateDataUpdatedLabel();
            render();
            if (!selected) {
                const preferred = stocks.CSI300_DIVIDEND_LOW_VOL ? "CSI300_DIVIDEND_LOW_VOL" : Object.keys(stocks)[0];
                await pick(preferred);
            }
        }

        document.getElementById("filter").addEventListener("click", event => {
            const btn = event.target.closest("[data-filter]");
            if (btn) setFilter(btn.dataset.filter);
        });

        document.getElementById("period-tabs").addEventListener("click", event => {
            const btn = event.target.closest("[data-period]");
            if (!btn) return;
            period = btn.dataset.period;
            document.querySelectorAll("[data-period]").forEach(item => item.classList.toggle("active", item === btn));
            loadChart();
        });

        document.getElementById("series-tabs").addEventListener("click", event => {
            const btn = event.target.closest("[data-series]");
            if (!btn) return;
            series = btn.dataset.series;
            updateSeriesTabs(stocks[selected]);
            updatePeriodTabs(stocks[selected]);
            updateChartSide(selected);
            loadChart();
        });

        document.getElementById("close").addEventListener("click", () => {
            document.getElementById("chart-shell").classList.remove("open");
        });

        document.getElementById("refresh").addEventListener("click", () => loadStocks(true));

        document.getElementById("language-toggle").addEventListener("click", async () => {
            lang = lang === "zh" ? "en" : "zh";
            localStorage.setItem("dashboardLanguage", lang);
            applyLanguage();
            render();
            if (selected && stocks[selected]) {
                updateSeriesTabs(stocks[selected]);
                updatePeriodTabs(stocks[selected]);
                updateChartSide(selected);
                await loadChart();
            }
        });

        if (socket) {
            socket.on("connect", () => {
                socketConnected = true;
                document.getElementById("conn-txt").textContent = tr("connected");
                document.getElementById("live-dot").style.background = "var(--green)";
            });

            socket.on("disconnect", () => {
                socketConnected = false;
                document.getElementById("conn-txt").textContent = tr("disconnected");
                document.getElementById("live-dot").style.background = "var(--red)";
            });

            socket.on("stock_update", data => {
                stocks = data;
                updateDataUpdatedLabel();
                render();
                const entries = visibleEntries();
                if (selected && stocks[selected]) {
                    updateSeriesTabs(stocks[selected]);
                    updatePeriodTabs(stocks[selected]);
                    updateChartSide(selected);
                } else if (entries.length) {
                    pick(entries[0][0]);
                }
            });
        }

        applyLanguage();
        updateBeijingTimeLabel();
        setInterval(updateBeijingTimeLabel, 1000);
        loadStocks();
    </script>
</body>
</html>
